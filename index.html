<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" as="style" crossorigin
        href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
    <link rel="stylesheet" href="style.css">
    <title>판다마켓</title>

    <meta property="og:title" content="판다마켓">
    <meta property="og:url" content="https://relaxed-valkyrie-abd905.netlify.app">
    <meta property="og:image" content="/images/img_home_top.svg">
    <meta property="og:description" content="일상에서 모든 물건을 거래해보세요">
</head>

<body>
    <header>
        <div class="container">
            <div onclick="location.href = '/'" class="logo">
                <img class="img-icon" src="images/ic_panadamarket.svg" alt="아이콘">
                <img class="img-logo" src="images/text_logo.svg" alt="로고">
            </div>
            <button onclick="location.href = '/login'">로그인</button>
        </div>
    </header>

    <main>
        <div class="top">
            <div class="container">
                <div>
                    <h1>일상의 모든 물건을 거래해 보세요</h1>
                    <button onclick="location.href = '/items'">구경하러 가기</button>
                </div>
                <img src="images/img_home_top.svg" alt="상단 소개이미지">
            </div>
        </div>

        <div class="middle">
            <div class="section">
                <img class="img-home" src="images/img_home_01.svg" alt="인기상품 이미지">
                <div class="label">
                    <h1>Hot item</h1>
                    <h2>인기 상품을 확인해 보세요</h2>
                    <p>가장 HOT한 중고거래 물품을<br /> 판다 마켓에서 확인해 보세요</p>
                </div>
            </div>

            <div class="section reverse">
                <img class="img-home" src="images/img_home_02.svg" alt="상품검색 이미지">
                <div class="label">
                    <h1>Search</h1>
                    <h2>구매를 원하는 상품을 검색하세요</h2>
                    <p>구매하고 싶은 물건은 검색해서<br /> 쉽게 찾아보세요</p>
                </div>
            </div>

            <div class="section">
                <img class="img-home" src="images/img_home_03.svg" alt="상품등록 이미지">
                <div class="label">
                    <h1>Register</h1>
                    <h2>판매를 원하는 상품을 등록하세요</h2>
                    <p>어떤 물건이든 판매하고 싶은 상품을<br /> 쉽게 등록하세요</p>
                </div>
            </div>
        </div>

        <div class="bottom">
            <div class="container">
                <h1>믿을 수 있는<br /> 판다마켓 중고 거래</h1>
                <img src="images/img_home_bottom.svg" alt="하단 소개이미지">
            </div>
        </div>
    </main>

    <footer>
        <div class="container">
            <p>
                ©codeit - 2024
            </p>
            <div class="info-buttons">
                <a href="/privacy">Privacy Policy</a>
                <a href="/faq">FAQ</a>
            </div>
            <div class="link-buttons">
                <a href="https://facebook.com" target="_blank" rel="noopener noreferrer">
                    <img src="images/ic_facebook.svg" alt="Facebook">
                </a>
                <a href="https://twitter.com" target="_blank" rel="noopener noreferrer">
                    <img src="images/ic_twitter.svg" alt="Twitter">
                </a>
                <a href="https://youtube.com" target="_blank" rel="noopener noreferrer">
                    <img src="images/ic_youtube.svg" alt="YouTube">
                </a>
                <a href="https://instagram.com" target="_blank" rel="noopener noreferrer">
                    <img src="images/ic_instagram.svg" alt="Instagram">
                </a>
            </div>
        </div>
    <footer/>

</body>

</html>
