<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="reset.css">
</head>
<body>
    <header>
        <div class="outer-margin-set">
        <div class="header-set inner-margin-set">
            <a class="logo" href="/">
                <img class="logo-image" src="./images/landing/logo.svg">
            </a>
            <a class="login" href="/login">
                로그인
            </a>
        </div>
        </div>
    </header>
    <main>
        <section class="headline head">
            <div class="outer-margin-set">
            <div class="inner-margin-set">
                <div>
                    <div class="descripton">
                        <h1>
                            일상의 모든 물건을<br>
                            거래해 보세요
                        </h1>
                        <a class="items" href="/items">구경하러 가기</a>
                    </div>
                    <img src="./images/landing/home_top.svg">
                </div>
            </div>
            </div>
        </section>
        <section class="sec hot-item">
            <div class="outer-margin-set">
            <div class="inner-margin-set">
                <div class="section-box">
                    <img src="./images/landing/goods.svg">
                    <div class="descripton">
                        <h2>Hot item</h2>
                        <h1>
                            인기 상품을<br>
                            확인해 보세요
                        </h1>
                        <h3>
                            가장 핫한 중고거래 물품을
                            판다마켓에서 확인해 보세요
                        </h3>
                    </div>
                </div>
            </div>
        </section>
        <section class="sec buy">
            <div class="outer-margin-set">
            <div class="inner-margin-set">
                <div class="section-box">
                    <div class="descripton">
                        <h2>Search</h2>
                        <h1>
                            구매를 원하는<br>
                            상품을 검색하세요
                        </h1>
                        <h3>
                            구매하고 싶은 물품은 검색해서
                            쉽게 찾아보세요
                        </h3>
                    </div>
                    <img src="./images/landing/buy_item.svg">
                </div>
            </div>
        </section>
        <section class="sec sell">
            <div class="outer-margin-set">
            <div class="inner-margin-set">
                <div class="section-box">
                    <img src="./images/landing/sell_item.svg">
                    <div class="descripton">
                        <h2>Register</h2>
                        <h1>
                            판매를 원하는<br>
                            상품을 등록하세요
                        </h1>
                        <h3>
                            어떤 물건이든 판매하고 싶은
                            상품을 쉽게 등록하세요.
                        </h3>
                    </div>
                </div>
            </div>
            </div>
        </section>
        <div class="interval">

        </div>
        <section class="headline tail">
            <div class="outer-margin-set">
            <div class="inner-margin-set">
                <div>
                    <div class="descripton">
                        <h1>
                            믿을 수 있는<br>
                            판다마켓 중고 거래
                        </h1>
                    </div>
                    <img src="./images/landing/home_bottom.svg">
                </div>
            </div>
            </div>
        </section>
    </main>
    <footer>
        <div class="outer-margin-set">
            <div class="footer-line">
                <h1 class="company-name">
                    ©codeit - 2024
                </h1>
                <div class="policy">
                    <a href="/privacy">Privacy Policy</a>
                    <a href="/faq">FAQ</a>
                </div>
                <div class="sns-logo">
                    <a href="https://www.facebook.com/">
                        <img src="./images/landing/facebook.svg">
                    </a>
                    <a href="https://www.twitter.com/">
                        <img src="./images/landing/twitter.svg">
                    </a>
                    <a href="https://www.youtube.com/">
                        <img src="./images/landing/youtube.svg">
                    </a>
                    <a href="https://www.instagram.com/">
                        <img src="./images/landing/instagram.svg">
                    </a>
                </div>
            </div>
        </div>
    </footer>
</body>
</html>
