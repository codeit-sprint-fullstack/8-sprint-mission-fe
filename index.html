<body>

  <header class="header">
    <div class="header-outline">
      <div class="header-inner">
        <div class="logo">
          <a href="/"><img src="mainimg/logo.svg" alt="판다 마켓 로고" /></a>

  <div class="top">

        일상의 모든 물건을<br>거래해 보세요
      </div>

      </button>
    </div>
    <div class="top-image"></div>
  </div>
</div>



  <main>
    <!-- section-1 -->
    <section class="section-1">
      <div class="section-1-inline">
        <img class="bestitem" src="mainimg/bestitem.svg" alt="Best Item"/>
        <div>
          <div class="hot-item-text">Hot item</div>
          <div class="item-title">인기 상품을<br>확인해 보세요</div>
          <div class="item-subtitle">가장 HOT한 중고거래 물품을<br>판다 마켓에서 확인해 보세요</div>
        </div>
      </div>
    </section>

    <!-- section-2 -->
    <section class="section-2">
      <div class="section-2-inline">
        <div>
          <div class="search-text">Search</div>

        </div>
        <img class="search" src="mainimg/search.svg" alt="search"/> 
      </div>
    </section>

    <!-- section-3 -->
    <section class="section-3">
      <div class="section-3-inline">
        <img src="mainimg/register.svg" alt="register"/>
        <div>
          <div class="register-text">Register</div>
          <div class="register-title">판매를 원하는<br>상품을 등록하세요</div>
          <div class="register-subtitle">어떤 물건이든 판매하고 싶은 상품을<br>쉽게 등록하세요</div>
        </div>
      </div>
    </section>

    <!-- section-4 -->
    <section class="section-4">
  <div class="section-4-inner container">
    <div class="section-4-text">
      믿을 수 있는<br>판다 마켓 중고 거래
    </div>

</section>
