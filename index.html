<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <link rel="icon" href="img/common/icons/favicon.ico" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>판다마켓</title>

  <link rel="stylesheet" as="style" crossorigin
    href="https://cdn.jsdelivr.net/npm/pretendard@latest/dist/web/static/pretendard.css">
  <link rel="stylesheet" href="styles/reset.css">
  <link rel="stylesheet" href="styles/home.css">

  <!-- Google tag (gtag.js) -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-2PYKRF27CN"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag() { dataLayer.push(arguments); }
    gtag('js', new Date());

    gtag('config', 'G-2PYKRF27CN');

<body>
  <header class="header">
    <div class="wrapper">
      <a href="/"><img src="img/common/logo/logo-sm.svg" alt="판다마켓 홈" class="header_logo" /></a>
      <a href="/login" class="btn_login">로그인</a>
    </div>
  </header>
  <main class="main">
    <section class="top">
      <div class="wrapper">
        <div>
          <div class="home_title">일상의 모든 물건을<br>거래해보세요</div>
          <a href="/items" class="btn_large">구경하러 가기</a>
        </div>
        <img src="img/pages/home/Img_home_top.svg" />
      </div>
    </section>
    <section class="middle">
      <div>
        <img src="img/pages/home/Img_home_01.svg" alt="인기 상품" />
        <div class="img_desc left_align">
          <div class="home_summary">Hot item</div>
          <div class="home_title">인기 상품을<br>확인해 보세요</div>
          <div class="home_desc">가장 HOT한 중고거래 물품을 판다 마켓에서 확인해 보세요</div>
        </div>
      </div>
      <div>
        <img src="img/pages/home/Img_home_02.svg" alt="검색 기능" />
        <div class="img_desc right_align">
          <div class="home_summary">Search</div>
          <div class="home_title">구매를 원하는<br>상품을 검색하세요</div>
          <div class="home_desc">구매하고 싶은 물품은 검색해서 쉽게 찾아보세요</div>
        </div>
      </div>
      <div>
        <img src="img/pages/home/Img_home_03.svg" alt="상품 등록" />
        <div class="img_desc left_align">
          <div class="home_summary">Register</div>
          <div class="home_title">판매를 원하는<br>상품을 등록하세요</div>
          <div class="home_desc">어떤 물건이든 판매하고 싶은 상품을 쉽게 등록하세요</div>
        </div>
      </div>
    </section>
    <section class="bottom">
      <div class="wrapper">
        <div class="home_title">믿을 수 있는<br>판다마켓 중고 거래</div>
        <img src="img/pages/home/Img_home_bottom.svg" />
      </div>
    </section>
  </main>
  <footer class="footer">
    <div class="wrapper">
      <section>
        ©codeit - 2024
      </section>
      <section class="footer_center">
        <a href="/privacy">Privacy Policy</a>
        <a href="/faq">FAQ</a>
      </section>
      <section class="footer_right">
        <a href="https://www.facebook.com" target="_blank" rel="noopener noreferrer">
          <img src="img/common/social/facebook.svg" alt="페이스북" />
        </a>
        <a href="https://www.twitter.com" target="_blank" rel="noopener noreferrer">
          <img src="img/common/social/twitter.svg" alt="트위터" />
        </a>
        <a href="https://www.youtube.com" target="_blank" rel="noopener noreferrer">
          <img src="img/common/social/youtube.svg" alt="유튜브" />
        </a>
        <a href="https://www.instagram.com" target="_blank" rel="noopener noreferrer">
          <img src="img/common/social/instagram.svg" alt="인스타그램" />
        </a>
      </section>
    </div>
  </footer>
</body>

</html>
