<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>판다마켓</title>
  </head>
  <body>
    <header class="nav">
      <div class="nav-container">
        <a href="/" class="logo-home">
          <img
            src="./images/fullplogo.svg"
            alt="PanDaMarketLogo"
            class="PanDaMarketLogo"
          />
        </a>
        <a href="login.html" class="login-btn">로그인</a>
      </div>
    </header>

    <main>
      <div class="headline-wrap">
        <div class="global-nav-bar">
          <div class="headline-text">
            <h1 class="main-title">
              일상의 모든 물건을<br />
              거래해 보세요
            </h1>
            <a href="items.html" class="explore-btn">구경하러가기</a>
          </div>
          <img
            class="headline-image"
            src="../images/headline-image.svg"
            alt="Headline Image"
          />
        </div>
      </div>
      <div class="main-body-content">
        <div class="hot-items">
          <img
            class="main-img-left"
            src="../images/hot-items.svg"
            alt="Hot Items"
          />
          <div class="main-txt-right">
            <h3 class="main-subtitle">Hot items</h3>
            <h1 class="main-title">
              인기 상품을 <br />
              확인해 보세요
            </h1>
            <p class="main-description">
              가장 HOT한 중고거래 물품을 판다 마켓에서 확인해 보세요
            </p>
          </div>
        </div>

        <div class="search">
          <div class="main-txt-right">
            <h3 class="main-subtitle">Search</h3>
            <h1 class="main-title">구매를 원하는 상품을 검색하세요</h1>
            <p class="main-description">
              구매하고 싶은 물품은 검색해서 쉽게 찾아보세요
            </p>
          </div>
          <img class="main-img-right" src="../images/search.svg" alt="Search" />
        </div>

        <div class="register">
          <img
            class="main-img-left"
            src="../images/register.svg"
            alt="Register"
          />
          <div class="main-txt-right">
            <h3 class="main-subtitle">Register</h3>
            <h1 class="main-title">
              판매를 원하는 상품을 <br />
              등록하세요
            </h1>
            <p class="main-description">
              어떤 물건이든 판매하고 싶은 상품을 쉽게 등록하세요
            </p>
          </div>
        </div>
      </div>
    </main>

    <footer>
      <div class="footer-content">
        <div class="footer-ad">
          <h1 class="footer-ad-title">
            믿을 수 있는 <br />
            판다마켓 중고 거래
          </h1>
          <img
            src="../images/footer-ad.svg"
            alt="PanDaMarket-ad"
            class="PandaMarket-ad"
          />
        </div>
      </div>
      <div class="footerLinks">
        <div class="footerLinks-container">
          <div class="footerLinks-right">
            <p class="footer-copyright">©codeit - 2024</p>
          </div>

            <a href="/privacy.html">Privacy Policy</a>
            <a href="/faq.html">FAQ</a>
          </div>
          <div class="footerLinks-left" target="_blank">
            <a href="https://facebook.com" target="_blank">
              <img src="../images/facebook-icon.svg" alt="Facebook" />
            </a>
            <a href="https://twitter.com" target="_blank">
              <img src="../images/twitter-icon.svg" alt="Twitter" />
            </a>
            <a href="https://www.youtube.com/" target="_blank">
              <img src="../images/youtube-icon.svg" alt="YouTube" />
            </a>
            <a href="https://instagram.com" target="_blank">
              <img src="../images/insta-icon.svg" alt="Instagram" />
            </a>
          </div>
        </div>
      </div>
