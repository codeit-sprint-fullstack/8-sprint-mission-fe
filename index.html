<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

      name="description"
      content="판다마켓에서 당신의 상품을 거래하세요. 안전하고 신뢰할 수 있는 중고거래 플랫폼입니다."
    />
    <meta name="keywords" content="판다마켓, 중고거래, 온라인마켓, 중고물품" />
    <title>판다마켓</title>

    <!-- 스타일 시트 -->
    <link rel="stylesheet" href="./assets/css/reset.css" />
    <link rel="stylesheet" href="./assets/css/common.css" />
    <link rel="stylesheet" href="./assets/css/main.css" />

    <!-- 오픈그래프 프로토콜 적용 -->
    <meta property="og:title" content="판다마켓" />
    <meta
      property="og:description"
      content="일상에서 모든 물건을 거래해보세요"
    />
    <meta property="og:image" content="./assets/img/common/og-img.svg" />
    <meta property="og:url" content="/" />
    <meta property="og:type" content="website" />
    <meta property="og:locale" content="ko_KR" />

    <script async src="https://www.googletagmanager.com/gtag/js?id=G-L7DD347SLB"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag() {
        dataLayer.push(arguments);
      }
      gtag("js", new Date());
      gtag("config", "G-L7DD347SLB");
    </script>
  </head>
  <body>
    <header class="header">
      <nav class="nav">
        <a href="/" class="logo" aria-label="판다마켓 홈으로 이동">
          <picture>
            <source srcset="./assets/img/header/logo-sm.svg" media="(max-width: 744px)" />
            <img src="./assets/img/header/logo.svg" alt="판다마켓 로고" />
          </picture>
        </a>
        <a href="/login" class="btn-small-40">로그인</a>
      </nav>
    </header>

    <main class="main">
      <div class="main-container">
        <section class="hero-section">
          <div class="hero-text-container">
            <h1>
              일상의 모든 물건을<br class="tablet-none" />
              거래해 보세요
            </h1>
            <a href="./items" class="btn-large">구경하러 가기</a>
          </div>
        </section>

        <section class="features-section">
          <article class="feature-item">
            <img src="./assets/img/main-page/feature-img-01.svg" alt="인기 상품 아이콘" />
            <div class="item-text-container">
              <p class="text-tag">Hot Item</p>
              <h2>인기 상품을<br class="desktop-only" />확인해 보세요</h2>
              <p class="item-text">
                가장 HOT한 중고거래 물품을 <br />
                판다 마켓에서 확인해 보세요
              </p>
            </div>
          </article>

          <article class="feature-item">
            <div class="item-text-container">
              <p class="text-tag">Search</p>
              <h2>구매를 원하는<br class="desktop-only" />상품을 검색하세요</h2>
              <p class="item-text">
                구매하고 싶은 물품은 검색해서<br />
                쉽게 찾아보세요
              </p>
            </div>
            <img src="./assets/img/main-page/feature-img-02.svg" alt="검색 아이콘" />
          </article>

          <article class="feature-item">
            <img src="./assets/img/main-page/feature-img-03.svg" alt="등록 아이콘" />
            <div class="item-text-container">
              <p class="text-tag">Register</p>
              <h2>판매를 원하는<br class="desktop-only" />상품을 등록하세요</h2>
              <p class="item-text">
                어떤 물건이든 판매하고 싶은 상품을<br />
                쉽게 등록하세요
              </p>
            </div>
          </article>
        </section>
      </div>

      <section class="hero-section hero-section-2">
        <div class="hero-text-container">
          <h1>믿을 수 있는<br />판다마켓 중고 거래</h1>
        </div>
      </section>
    </main>

    <footer>
      <div class="footer-container">
        <p class="copyright">©codeit - 2025</p>
        <nav class="footer-nav">
          <a href="/privacy">Privacy Policy</a>
          <a href="/faq">FAQ</a>
        </nav>
        <div class="social-links">
          <a 
            href="https://facebook.com" 
            target="_blank" 
            rel="noopener noreferrer" 
            aria-label="페이스북으로 이동"
          >
            <img src="./assets/img/footer/footer-icon-01.svg" alt="페이스북 아이콘" />
          </a>
          <a 
            href="https://twitter.com" 
            target="_blank" 
            rel="noopener noreferrer" 
            aria-label="트위터로 이동"
          >
            <img src="./assets/img/footer/footer-icon-02.svg" alt="트위터 아이콘" />
          </a>
          <a 
            href="https://youtube.com" 
            target="_blank" 
            rel="noopener noreferrer" 
            aria-label="유튜브로 이동"
          >
            <img src="./assets/img/footer/footer-icon-03.svg" alt="유튜브 아이콘" />
          </a>
          <a 
            href="https://instagram.com"
            target="_blank"
            rel="noopener noreferrer"
            aria-label="인스타그램으로 이동"
          >
            <img src="./assets/img/footer/footer-icon-04.svg" alt="인스타그램 아이콘" />
          </a>
        </div>
      </div>
    </footer>

</html>
