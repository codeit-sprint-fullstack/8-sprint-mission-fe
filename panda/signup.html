<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>판다마켓 회원가입</title>
    <link rel="stylesheet" href="./styles/reset.css" />
    <link rel="stylesheet" href="./fonts/pretendard-1.3.9/web/static/Pretendard.css" />
    <link rel="icon" href="./images/logo/favicon.ico" />
    <link rel="stylesheet" href="./styles/global.css" />
    <link rel="stylesheet" href="./styles/signup.css" />
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-NBT77RR2C1"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());

      gtag('config', 'G-NBT77RR2C1');
    </script>
  </head>
  <body>
    <div class="container">
      <a href="/" class="logo-wrapper">
        <img src="./images/logo/panda-logo.svg" alt="판다마켓 로고" />
      </a>

      <form class="signup-form">
        <div class="form-group">
          <label for="email">이메일</label>
          <input type="email" id="email" placeholder="이메일을 입력해주세요" />
        </div>

        <div class="form-group">
          <label for="nickname">닉네임</label>
          <input type="text" id="nickname" placeholder="닉네임을 입력해주세요" />
        </div>

        <div class="form-group">
          <label for="password">비밀번호</label>
          <div class="password-wrapper">
            <input type="password" id="password" placeholder="비밀번호를 입력해주세요" />
            <img src="./images/home/eye.svg" class="password-icon" id="togglePassword" alt="비밀번호 보기" />
          </div>
        </div>

        <div class="form-group">
          <label for="passwordConfirm">비밀번호 확인</label>
          <div class="passwordConfirm-wrapper">
            <input type="password" id="passwordConfirm" placeholder="비밀번호를 다시 한 번 입력해주세요" />
           <img src="./images/home/eye.svg" class="password-icon" id="togglePasswordConfirm" alt="비밀번호 보기" />
          </div>
        </div>
        <button type="submit" class="signup-button" id="signupBtn" disabled>회원가입</button>
      </form>

      <div class="social-login">
        <span class="social-text">간편 로그인하기</span>
        <div class="sns-icons">
          <a href="https://google.com/" target="_blank">
            <img src="./images/home/google.svg" alt="구글" />
          </a>
          <a href="https://kakaocorp.com/page/" target="_blank">
            <img src="./images/home/kakao.svg" alt="카카오" />
          </a>
        </div>
      </div>

      <div class="go-login">
        <span>이미 회원이신가요?</span>
        <a href="./login.html">로그인</a>
      </div>
    </div>
    <script type="module" src="./scripts/main.js" defer></script>
  </body>
</html>
