<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=1920" />
    <title>판다마켓 회원가입</title>
    <link rel="stylesheet" href="./styles/reset.css" />
    <link rel="stylesheet" href="./fonts/pretendard-1.3.9/web/static/Pretendard.css" />
    <link rel="icon" href="./images/logo/favicon.ico" />
    <link rel="stylesheet" href="./styles/global.css" />
    <link rel="stylesheet" href="./styles/signup.css" />
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-NBT77RR2C1"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());

      gtag('config', 'G-NBT77RR2C1');
    </script>
  </head>
  <body>
    <div class="container">
      <a href="/" class="logo-wrapper">
        <img src="./images/logo/panda-logo.svg" alt="판다마켓 로고" />
      </a>

      <form class="signup-form">
        <div class="form-group">
          <label for="email">이메일</label>
          <input type="email" id="email" placeholder="이메일을 입력해주세요" />
        </div>

        <div class="form-group">
          <label for="nickname">닉네임</label>
          <input type="text" id="nickname" placeholder="닉네임을 입력해주세요" />
        </div>

        <div class="form-group">
          <label for="password">비밀번호</label>
          <div class="password-wrapper">
            <input type="password" id="password" placeholder="비밀번호를 입력해주세요" />
            <img src="images/home/eye.svg" class="password-icon" id="togglePassword" alt="비밀번호 보기" />
          </div>
        </div>

        <div class="form-group">
          <label for="passwordConfirm">비밀번호 확인</label>
          <div class="passwordConfirm-wrapper">
            <input type="password" id="passwordConfirm" placeholder="비밀번호를 다시 한 번 입력해주세요" />
           <img src="./images/home/eye.svg" class="password-icon" id="togglePasswordConfirm" alt="비밀번호 보기" />
          </div>
        </div>
        <button type="submit" class="signup-button" id="signupBtn" disabled>회원가입</button>
      </form>

      <div class="social-login">
        <span class="social-text">간편 로그인하기</span>
        <div class="sns-icons">
          <a href="https://google.com/" target="_blank">
            <img src="./images/home/google.svg" alt="구글" />
          </a>
          <a href="https://kakaocorp.com/page/" target="_blank">
            <img src="./images/home/kakao.svg" alt="카카오" />
          </a>
        </div>
      </div>

      <div class="go-login">
        <span>이미 회원이신가요?</span>
        <a href="./login.html">로그인</a>
      </div>
    </div>
    <script>
      const emailInput = document.getElementById('email');
      const nicknameInput = document.getElementById('nickname');
      const passwordInput = document.getElementById('password');
      const passwordConfirmInput = document.getElementById('passwordConfirm');
      const signupBtn = document.getElementById('signupBtn');
      const togglePassword = document.getElementById('togglePassword');
      const togglePasswordConfirm = document.getElementById('togglePasswordConfirm');

      function updateButtonState() {
        const email = emailInput.value.trim();
        const nickname = nicknameInput.value.trim();
        const password = passwordInput.value.trim();
        const passwordConfirm = passwordConfirmInput.value.trim();

        const isFilled = email && nickname && password && passwordConfirm;
        const isPasswordMatch = password === passwordConfirm;

        if (isFilled && isPasswordMatch) {
          signupBtn.disabled = false;
          signupBtn.style.backgroundColor = '#3692ff';
          signupBtn.style.cursor = 'pointer';
        } else {
          signupBtn.disabled = true;
          signupBtn.style.backgroundColor = '#9ca3af';
          signupBtn.style.cursor = 'default';
        }
      }

      emailInput.addEventListener('input', updateButtonState);
      nicknameInput.addEventListener('input', updateButtonState);
      passwordInput.addEventListener('input', updateButtonState);
      passwordConfirmInput.addEventListener('input', updateButtonState);

      togglePassword.addEventListener('click', () => {
        const isVisible = passwordInput.type === 'text';
        passwordInput.type = isVisible ? 'password' : 'text';
      });

      togglePasswordConfirm.addEventListener('click', () => {
        const isVisible = passwordConfirmInput.type === 'text';
        passwordConfirmInput.type = isVisible ? 'password' : 'text';
      });
    </script>
  </body>
</html>
