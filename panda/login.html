<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=1920" />
    <title>판다마켓 로그인</title>
    <link rel="stylesheet" href="./styles/reset.css" />
    <link rel="stylesheet" href="./fonts/pretendard-1.3.9/web/static/Pretendard.css" />
    <link rel="icon" href="./images/logo/favicon.ico" />
    <link rel="stylesheet" href="./styles/global.css" />
    <link rel="stylesheet" href="./styles/login.css" />
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-NBT77RR2C1"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());

      gtag('config', 'G-NBT77RR2C1');
    </script>
  </head>
  <body>
    <div class="container">
      <a href="/" class="logo-wrapper">
        <img src="./images/logo/panda-logo.svg" alt="판다마켓 로고" />
      </a>
      
      <form class="login-form">
        <div class="form-group">
          <label for="email">이메일</label>
          <input type="email" id="email" placeholder="이메일을 입력해주세요" />
        </div>

        <div class="form-group">
          <label for="password">비밀번호</label>
          <div class="password-wrapper">
            <input type="password" id="password" placeholder="비밀번호를 입력해주세요" />
            <img src="./images/home/eye.svg" class="password-icon" id="togglePassword" alt="비밀번호 보기" />
          </div>
        </div>

        <button type="submit" class="login-button" id="loginBtn" disabled>로그인</button>
      </form>

      <div class="social-login">
        <span class="social-text">간편 로그인하기</span>
        <div class="sns-icons">
          <a href="https://google.com/" target="_blank">
            <img src="./images/home/google.svg" alt="구글" />
          </a>
          <a href="https://kakaocorp.com/page/" target="_blank">
            <img src="./images/home/kakao.svg" alt="카카오" />
          </a>
        </div>
      </div>
      <div class="signup-guide">
        <span>판다마켓이 처음이신가요?</span>
        <a href="./signup.html">회원가입</a>
      </div>
    </div>
    <script>
      const emailInput = document.getElementById('email');
      const passwordInput = document.getElementById('password');
      const loginBtn = document.getElementById('loginBtn');
      const togglePassword = document.getElementById('togglePassword');

      function updateButtonState() {
        const email = emailInput.value.trim();
        const password = passwordInput.value.trim();

        const isFilled = email !== "" && password !== "";
        loginBtn.disabled = !isFilled;

        if (isFilled) {
          loginBtn.style.backgroundColor = '#3692ff';
          loginBtn.style.cursor = 'pointer';
        } else {
          loginBtn.style.backgroundColor = '#9ca3af';
          loginBtn.style.cursor = 'default';
        }
      }

      emailInput.addEventListener('input', updateButtonState);
      passwordInput.addEventListener('input', updateButtonState);

      togglePassword.addEventListener('click', () => {
        const isPasswordVisible = passwordInput.type === 'text';
        passwordInput.type = isPasswordVisible ? 'password' : 'text';
      });
    </script>
  </body>
</html>
