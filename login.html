<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>로그인</title>
  <link rel="stylesheet" href="login.css">
  <link rel="icon" href="img/판다 얼굴.svg">
  <!-- Google Tag Manager -->
  <script>(function(w,d,s,l,i){w[l]=w[l]||[];w[l].push({'gtm.start':
  new Date().getTime(),event:'gtm.js'});var f=d.getElementsByTagName(s)[0],
  j=d.createElement(s),dl=l!='dataLayer'?'&l='+l:'';j.async=true;j.src=
  'https://www.googletagmanager.com/gtm.js?id='+i+dl;f.parentNode.insertBefore(j,f);
  })(window,document,'script','dataLayer','GTM-WP56SG7G');</script>
  <!-- End Google Tag Manager -->
</head>

<body>
  <!-- Google Tag Manager (noscript) -->
  <noscript><iframe src="https://www.googletagmanager.com/ns.html?id=GTM-WP56SG7G"
  height="0" width="0" style="display:none;visibility:hidden"></iframe></noscript>
  <!-- End Google Tag Manager (noscript) -->

  <article>
    <!-- Logo -->
    <a href="index.html" class="logo">
      <img src="img/logo_lg.svg" alt="판다 얼굴">
    </a>

    <!-- Login Form -->
    <form>
        <div class="input-section">
          <div class="input_box">
            <label for="email">이메일</label>
            <input type="email" id="email" name="email" placeholder="이메일을 입력해주세요" required>
          </div>
          <div class="input_box">
            <label for="password">비밀번호</label>
            <input type="password" id="password" name="password" placeholder="비밀번호를 입력해주세요" required>
          </div>
          <a href="" class="login-button">로그인</a>
        </div>

        <!-- Social Login -->
        <div class="social-login">
          <div class="social-login-options">
            <p>간편 로그인하기</p>
            <div class="social-icons">
              <a href="https://www.google.com/" target="_blank">
                <img src="img/ic_Google.svg" alt="Google 로그인">
              </a>
              <a href="https://www.kakao.com/page/" target="_blank">
                <img src="img/ic_Kakao.svg" alt="Kakao 로그인">
              </a>
            </div>
          </div>
        </div>

        <!-- SignUp Link -->
        <div class="signup-section">
          <p>판다마켓이 처음이신가요?</p>
          <a href="signup.html" class="signup-button">회원가입</a>
        </div>
    </form>
  </article>
</body>
</html>
