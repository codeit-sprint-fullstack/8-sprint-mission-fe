<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>login</title>
    <link rel="stylesheet" as="style" crossorigin
        href="https://cdn.jsdelivr.net/npm/pretendard@latest/dist/web/static/pretendard.css">
    <link rel="stylesheet" href="styles/reset.css">
    <link rel="stylesheet" href="styles/style.css">
    <link rel="stylesheet" href="styles/auth.css">
</head>

<body>
    <main class="container">
        <a href="/"><img src="img/logo-lg.svg" /></a>
        <form>
            <fieldset>
                <label for="email">이메일</label>
                <div class="input-group">
                    <input id="email" type="email" autocomplete="email" placeholder="이메일을 입력해 주세요" required />
                </div>
            </fieldset>
            <fieldset>
                <label for="input-pwd">비밀번호</label>
                <div class="input-group">
                    <input id="input-pwd" type="password" placeholder="비밀번호를 입력해 주세요" />
                    <button id="toggle-pwd"></button>
                </div>
            </fieldset>
            <button type="submit" id="submit">로그인</button>
        </form>
        <section class="ez-login">
            <div>간편 로그인하기</div>
            <div>
                <a href="https://www.google.com/"><img src="img/google.svg" /></a>
                <a href="https://www.kakaocorp.com/page/"> <img src="img/kakaotalk.svg" /></a>
            </div>
        </section>
        <div class="signup">
            판다마켓이 처음이신가요? <a href="/signup.html">회원가입</a>
        </div>
    </main>
</body>

</html>
