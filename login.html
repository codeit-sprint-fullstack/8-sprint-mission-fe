<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>로그인</title>
    <link rel="icon"href="Img/favicon.png" >
    <link href="style/login_signup.css" rel="stylesheet">
</head>
<body>
    <main>
        <div class="login_main">
            <div class="logo">
            <a href="/">
            <img src="Img/login_판다 얼굴.png" alt="판다 얼굴">
            <p>판다마켓</p>
            </a>
            </div>
            
            <form class="login_form" action="" method="POST">
                <label for="email">이메일</label>
                <input type="email" id="email" name="email" placeholder="이메일을 입력해주세요">
                <label for="password">비밀번호</label>
                <input type="password" id="password" name="password" placeholder="비밀번호를 입력해주세요">

            <button type="submit" id="submit" name="submit">로그인</button>
            </form>

            <div class="quick_login">
                <p>간편 로그인하기</p>
                <div class="click">
                <a href="https://www.google.com/"><img src="Img/Component 2.png" alt="구글로그인"></a>
                <a href="https://www.kakaocorp.com/page/"><img src="Img/Component 3.png" alt="카카오로그인"></a>
                </div>

            </div>
            
            <div class="first_visit">
                <p>판다마켓이 처음이신가요?<a href="signup.html">회원가입</a></p>
                

            </div>
        </div>


    </main>


</body>
</html>
