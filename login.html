<!DOCTYPE html>
<html lang="ko">
<head>
  <!-- Google tag (gtag.js) -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-14YPHPLMJC"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag() { dataLayer.push(arguments); }
    gtag('js', new Date());
    gtag('config', 'G-14YPHPLMJC');
  </script>
  <meta charset="UTF-8">
  <title>로그인</title>
  <link rel="stylesheet" href="/assets/css/reset.css">
  <link rel="stylesheet" href="/assets/css/common.css">
</head>
<body class="page-container">
  <div class="content-wrapper">
    <header>
      <a href="/"><img src="/assets/images/logo.svg" alt="판다마켓 로고"></a>
    </header>
    <main>
      <form class="form-container">
        <!-- 이메일 -->
        <div class="form-field">
          <label for="email" class="form-label">이메일</label>
          <input type="email" id="email" name="email" placeholder="이메일을 입력하세요" required>
        </div>

        <!-- 비밀번호 -->
        <div class="form-field">
          <label for="password" class="form-label">비밀번호</label>
          <div class="input-wrapper">
            <input type="password" id="password" name="password" placeholder="비밀번호를 입력하세요" required>
            <button type="button" class="toggle-password" aria-label="비밀번호 보기">
              <img src="/assets/images/eye(close).svg" alt="비밀번호 숨기기" />
            </button>
          </div>
        </div>

        <!-- 로그인 버튼 -->
        <button class="btn-primary" type="submit">로그인</button>

        <!-- 간편 로그인 -->
        <div class="simple-login-outline">
          <div class="simple-login">
            <p class="simple-login-text">간편 로그인</p>
            <div class="img-outline">
              <a href="https://www.google.com/" target="_blank" rel="noopener noreferrer">
                <img class="login-icon" src="/assets/images/google.svg" alt="구글">
              </a>
              <a href="https://www.kakaocorp.com/page/" target="_blank" rel="noopener noreferrer">
                <img class="login-icon" src="/assets/images/kakao.svg" alt="카카오">
              </a>
            </div>
          </div>
        </div>
        <p class="form-footer-text">판다마켓이 처음이신가요? <a href="/signup.html">회원가입</a></p>
      </form>
    </main>
  </div>
  <script type="module" src="/assets/js/common.js"></script>
  <script type="module" src="/assets/js/login.js"></script>
</body>
</html>
