<!DOCTYPE html>
<html lang="kr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
  <link rel="stylesheet" href="styles/style.css">
  <link rel="stylesheet" href="global.css">

<body>
  <header>
    <a href="/">
      <div class="logoIMG">

      </div>
    </a>
    <a href="login/login.html">

  <main>
    <section class="topBanner">
      <div class="wrapper">
        <div class="detail">
          <div class="title">
            일상의 모든 물건을<br>
            거래해 보세요
          </div>
          <a href="items/items.html">

        <div class="img">

    </div>
    </section>

      <div class="wrapper">

          <div class="title-text">

          <div class="title-text">

              구매를 원하는<br>

          <img src="img/section2_img.svg" alt="section2Img">

    </section>

      <div class="wrapper">
        <div class="img">
          <img src="img/section3_img.svg" alt="section3Img">
        </div>
        <div class="detail">
          <div class="tag">Register</div>
          <div class="title-text">  
            <div class="title">
              판매를 원하는<br>
              상품을 등록하세요
            </div>
            <div class="text">
              어떤 물건이든 판매하고 싶은 상품을<br>
              쉽게 등록하세요
            </div>
          </div>
        </div>
      </div>
    </section>
    <div class="bottomBanner">
      <div class="wrapper">
        <div class="text">
          믿을 수 있는<br>
          판다마켓 중고 거래

        <div class="img">
          <img src="img/img_home_bottom.svg" alt="bottomImg">

    <footer>
      <div class="wrapper">
        <img class="codeit" src="img/footer_codeit.svg" alt="codeit">
        <div class="privacy-faq">

          </a>

            <img class="twitter" src="img/ic_twitter.svg" alt="twitterLogo">
          </a>
          <a href="https://youtube.com" target="_blank">
            <img class="youtube" src="img/ic_youtube.svg" alt="youtubeLogo">
          </a>
          <a href="https://instagram.com" target="_blank">
            <img class="instagram" src="img/ic_instagram.svg" alt="instagramLogo">
          </a>
