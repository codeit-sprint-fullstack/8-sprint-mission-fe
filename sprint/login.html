<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>로그인화면</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
      href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700&display=swap"
      rel="stylesheet">
    <link rel="stylesheet" href="login.css">
  </head>
  <body>
    <div class="title">
      <img id="panda-logo" src="panda_face.svg">
      <h1 class="login-title">판다마켓</h1>
    </div>
      <form>
        <label for="username">이메일</label>
        <input id="username" name="username" placeholder="이메일을 입력하세요">
        
        <label for="password" >비밀번호</label>
        <input id="password" name="password" type="password" placeholder="비밀번호를 입력하세요">
        
        <button class="button" type="submit">로그인</button>
      </form>
      <div class="login2">
        <span>간편로그인하기</span>
        <div class="icon">
          <a href="https://www.google.com/">
            <img class="google"  src="Component 2.svg">
          </a>
          <a href="https://www.kakaocorp.com/page/">
            <img class="kakao" src="Component 3.svg">
          </a>
        </div>
      </div>
      <div class="signup">
      <span>판다마켓이 처음이신가요?</span>
      <a class="signupup" href="signup.html">회원가입</a>
      </div>
  </body>
</html>
