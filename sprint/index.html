<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="utf-8">
    <title>Panda Market</title>
    <link rel="stylesheet" href="ROKAF Sans Medium.otf">
    <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
    <link rel="stylesheet" href="style.css">
  </head>
  <body>
    <header>
      <div class="header-left">
        <img id="panda-logo" src="panda_face.svg">
        <h2 class="logo">판다마켓</h2>
      </div>
      <a href="login.html" class="login">로그인</a>
    </header>
      <div class="section1">
        <div class="top-content">
          <div class="top-text">
            <h1>일상의 모든 물건을<br>
            거래해 보세요</h1>
            <p class="button">구경하러 가기</p>
          </div>
          <div class="top-image">
            <img src="Img_home_top.svg"><img>
          </div>
        </div>
      </div>
      <main>
        <div class="content1">
          <div class="content1-image">
            <img src="Img_home_01.svg"><img>
          </div>
          <div class="content1-text">
            <span>Hot Item</span>
            <h2>인기 상품을<br>확인해 보세요</h2>
            <p>가장 HOT한 중고거래 물품을<br>판다 마켓에서 확인해보세요</p>
          </div>
        </div>
        <div class="content2">
          <div class="content2-text">
            <span>Search</span>
            <h2>구매를 원하는<br>상품을 검색하세요</h2>
            <p>구매하고 싶은 물품은 검색해서<br>쉽게 찾아보세요</p>
          </div>
          <div class="content2-image">
            <img src="Img_home_02.svg"><img>
          </div>
        </div>
        <div class="content3">
          <div class="content3-image">
            <img src="Img_home_03.svg"><img>
          </div>
          <div class="content3-text">
            <span>Register</span>
            <h2>판매를 원하는<br>상품을 등록하세요</h2>
            <p>어떤 물건이든 판매하고 싶은 상품을<br>쉽게 등록하세요</p>
          </div>
        </div>
      </main>
    <div class="section2">
      <div class="bottom-content">
        <h1>믿을 수 있는<br>
        판다마켓 중고 거래</h1>
        <div class="bottom-image">
          <img src="Img_home_bottom.svg"><img>
        </div>
      </div>
    </div>
  <footer>
    <p>@codeit - 2024</p>
    <div class="toe">
      <p>Privacy Policy</p>
      <p>FAQ</p>
    </div>
    <div class="SNS">
    <img src="ic_facebook.png" alt="sns1" width="20px" height="20px"><img>
    <img src="ic_twitter.png" alt="sns1" width="20px" height="20px"><img>
    <img src="ic_youtube.png" alt="sns1" width="20px" height="20px"><img>
    <img src="ic_instagram.png" alt="sns1" width="20px" height="20px"><img>
    </div>
  </footer>
  </body>
</html>
