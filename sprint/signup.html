<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>로그인화면</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
      href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700&display=swap"
      rel="stylesheet">
    <link rel="stylesheet" href="signup.css">
  </head>
  <body>
    <div class="title">
      <img id="panda-logo" src="panda_face.svg">
      <h1 class="login-title">판다마켓</h1>
    </div>
      <form>
        <label for="useremail">이메일</label>
        <input id="useremail" name="useremail" placeholder="이메일을 입력해주세요">
        
        <label for="userid" >닉네임</label>
        <input id="userid" name="userid" placeholder="닉네임을 입력해주세요">
        
        <label for="password" >비밀번호</label>
        <input id="password" name="password" type="password" placeholder="비밀번호를 입력해주세요">

        <label for="password-retry" >비밀번호 확인</label>
        <input id="password-retry" name="password-retry" type="password" placeholder="비밀번호를 다시 한번 입력해주세요">

        <button class="button" type="submit">가입하기</button>
      </form>
      <div class="login2">
        <span>간편로그인하기</span>
        <div class="icon">
          <a href="https://www.google.com/">
            <img class="google"  src="Component 2.svg">
          </a>
          <a href="https://www.kakaocorp.com/page/">
            <img class="kakao" src="Component 3.svg">
          </a>
        </div>
      </div>
      <div class="signup">
      <span>판다마켓이 처음이신가요?</span>
      <a class="signupup" href="login.html">로그인</a>
      </div>
  </body>
  <script src="./signup.js"></script>
</html>
