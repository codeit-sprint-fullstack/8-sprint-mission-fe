<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.8/dist/web/static/pretendard.css" />
  <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.8/dist/web/variable/pretendardvariable-dynamic-subset.css" />
  <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.8/dist/web/variable/pretendardvariable.css" />
  <title>회원가입</title>
  <link rel="stylesheet" href="../src/styles/reset.css">
  <link rel="stylesheet" href="./signup.css">
</head>
<body>
  <div class="center">
    <header>
      <a class="login_logo_total" href="../index.html">
        <img class="logo_icon"
          src="../images/login_panda.png"
          alt="판다로고 아이콘">
        <h1 class="login_logo">판다마켓</h1>
      </a>
    </header>
    <main>
      <form>
        <div>
          <div class="login_layout">
            <label for="userEmail">이메일</label>
            <input id="userEmail" name="userEmail" type="email" placeholder="이메일을 입력해주세요">
            <span id="email-error" class="error-message hidden"></span>
          </div>
          <div class="login_nickname">
            <label for="id">닉네임</label>
            <input id="id" name="id" type="text" placeholder="닉네임을 입력해주세요">
          </div>
          <div class="login_layout">
            <label for="password">비밀번호</label>
            <div class="password_layout">
              <input id="password" name="password" type="password" placeholder="비밀번호를 입력해주세요">
              <img class="password_vi" id="togglepassword"
                src="../images/visibility_off.png"
                alt="비밀번호 보기 눈">
            </div>
            <span id="password-error" class="error-message hidden"></span>
          </div>
          <div class="login_layout_re">
            <label for="password">비밀번호 확인</label>
            <div class="password_layout_re">
              <input id="password_re" name="password_re" type="password" placeholder="비밀번호를 다시 한 번 입력해주세요">
              <img class="password_vi_re" id="togglepassword_re"
                src="../images/visibility_off.png"
                alt="비밀번호 눈">
            </div>
            <span id="password-re-error" class="error-message hidden"></span>
          </div>
        </div>
        <div class="button_layout">
        <button type="submit">회원가입</button>
        </div>
      </form>
      <div class="simple_total">
        <div class="simple_layout">
          <h3 class="simple_login">간편 로그인하기</h3>
          <div class="simple_icon">
            <a href="https://www.google.com/"><img class="simple_google"
              src="../images/google_icon.png"
              alt="구글 간편로그인"></a>
            <a href="https://www.kakaocorp.com/page/"><img class="simple_kakao"
              src="../images/kakao_icon.png"
              alt="카카오톡 간편로그인"></a>
          </div>
        </div>
      </div>
      <div class="join_add">
        <h4>이미 회원이신가요?</h4>
        <a class="join" href="../login/login.html">로그인</a>
      </div>
    </main>
  </div>
    <div id="customModal" class="hidden">
    <div class="modal-content">
      <p id="modalMessage">사용 중인 이메일입니다.</p>
      <div class="modal_tab">
        <button id="closeModal">확인</button>
      </div>
    </div>
  </div>
  <script src="../signup/signup.js"></script>
  <script src="../common.js"></script>
</body>
