<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>회원가입</title>
    <link rel="icon"href="Img/favicon.png" >
    <link href="style/login_signup.css" rel="stylesheet">
</head>
<body>
    <main>
        <div class="signup_main">
            <div class="logo">
            <a href="/">
            <img src="Img/login_판다 얼굴.png" alt="판다 얼굴">
            <p>판다마켓</p>
            </a>
            </div>
            
            <form id="signup_form" class="signup_form" action="" method="POST">
                <label for="email">이메일</label>
                <input type="email" id="email" name="email" placeholder="이메일을 입력해주세요">
                <p id="emailMsg" style="color: red;"></p>

                <label for="name">닉네임</label>
                <input type="text" id="name" name="name" placeholder="닉네임을 입력해주세요">
                
                <label for="password">비밀번호</label>
                <input type="password" id="password" name="password" placeholder="비밀번호를 입력해주세요">
                <p id="passwordMsg" style="color: red;"></p>

                <label for="password_check">비밀번호 확인</label>
                <input type="password" id="password_check" name="password_check" placeholder="비밀번호를 다시 한 번 입력해주세요">                
                <p id="passwordCheckMsg" style="color: red;"></p>

            <button type="submit" id="submit" name="submit" disabled = "disabled">회원가입</button>
            </form>

            <div class="quick_login">
                <p>간편 로그인하기</p>
                <div class="click">
                <a href="https://www.google.com/"><img src="Img/Component 2.png" alt="구글로그인"></a>
                <a href="https://www.kakaocorp.com/page/"><img src="Img/Component 3.png" alt="카카오로그인"></a>
                </div>

            </div>
            
            <div class="first_visit">
                <p>이미 회원이신가요?<a href="login.html">로그인</a></p>
                

            </div>
        </div>


    </main>

<script src="signup.js"></script>
</body>
</html>
