<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>판다마켓</title>
  <link rel="stylesheet" href="reset.css" />
  <link rel="stylesheet" href="sprint1.css" />
  <link rel="icon" href="img/logoimg.png">
</head>

<body>
  <header>
    <div class="logo">
      <img class="logoimg" src="img/logoimg.png" alt="로고" />
      판다마켓
    </div>
    <a href="login.html"><button class="login_bt">로그인</button></a>
  </header>

  <section class="pt1">
    <article>
      <span>일상의 모든 물건을<br>거래해 보세요</span>
      <a href="items.html"><button class="main_btn">구경하러 가기</button></a>
    </article>
    <img src="img/mainimg.png" alt="팬더 이미지" />
  </section>

  <section class="pt2">
    <div class="card">
      <img src="img/1img.png" alt="인기 상품 이미지" />
      <div class="text">
        <h4 class="label blue">Hot item</h4>
        <h3>인기 상품을<br>확인해 보세요</h3>
        <p>가장 HOT한 중고거래 물품을<br>판다 마켓에서 확인해 보세요</p>
      </div>
    </div>
    <div class="card reverse">
      <img src="img/2img.png" alt="검색 이미지" />
      <div class="text">
        <h4 class="label blue">Search</h4>
        <h3>구매를 원하는<br>상품을 검색하세요</h3>
        <p>구매하고 싶은 물품은 검색해서<br>쉽게 찾아보세요</p>
      </div>
    </div>
  </section>

  <section class="pt3">
    <div class="card reverse">
      <div class="text">
        <h4 class="label blue">Register</h4>
        <h3>판매를 원하는<br>상품을 등록하세요</h3>
        <p>어떤 물건이든 판매하고 싶은<br>상품을 쉽게 등록하세요</p>
      </div>
      <img src="img/3img.png" alt="등록 이미지" />
    </div>
  </section>

  <section class="pt4">
    <div class="footer-card">
      <div class="text">
        <h3>믿을 수 있는<br>판다마켓 중고 거래</h3>
      </div>
      <img src="img/footerimg.png" alt="신뢰 이미지" />
    </div>
  </section>

  <footer>
    <div class="footer-text">
      ©codeit - 2024
    </div>
   <span class="footermenu"><a href="Privacy.html">Privacy Policy</a> <a href="FAQ.html">FAQ</a></span>
    <div class="social-icons">
      <a href="https://www.facebook.com/"
          target="_blank"
          rel="noopener noreferrer">
        <img src=".\img/facebook.png" alt="facebook"/></a>

        <a href="https://www.facebook.com/"
          target="_blank"
          rel="noopener noreferrer">
      <img src=".\img/twit.png" alt="twitter"/></a>

      <a   href="https://www.youtube.com/"
          target="_blank"
          rel="noopener noreferrer">
          <img src=".\img/youtube.png" alt="youtube"/></a>

     <a
          href="https://www.instagram.com/"
          target="_blank"
          rel="noopener noreferrer"> <img src=".\img\insta.png" alt="insta"/></a>
    </div>
  </footer>
</body>
</html>
