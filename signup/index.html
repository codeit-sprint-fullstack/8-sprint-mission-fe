<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">

<body>
    <!-- Google Tag Manager (noscript) -->

    height="0" width="0" style="display:none;visibility:hidden"></iframe></noscript>

    <div class="signup-box">
        <div class="main-logo">
            <a class="clickable" href="/">
                <img src="/images/landing/logo.svg">
            </a>
        </div>
        <form class="signup-form">
            <label for="id-input">이메일</label>
            <input id="id-input" name="username" type="email" placeholder="이메일을 입력해주세요">
            <label for="nickname-input">닉네임</label>
            <input id="nickname-input" name="username" placeholder="닉네임을 입력해주세요">
            <label for="pw-input">비밀번호</label>
            <div class="pw-input-box">
                <input id="pw-input" name="password" type="password" placeholder="비밀번호를 입력해주세요">
                <a class="pw-eye" >
                    <img src="/images/login/pw_eye.svg">
                </a>
            </div>
            <label for="repw-input">비밀번호 확인</label>
            <div class="pw-input-box">
                <input id="repw-input" name="password" type="password" placeholder="비밀번호를 다시 한 번 입력해주세요">
                <a class="pw-eye" >
                    <img src="/images/login/pw_eye.svg">
                </a>
            </div>
            <button>회원가입</button>
        </form>
        <div class="simple-login">
            <h1>간편 로그인 하기</h1>
            <div>
                <a class="clickable" href="https://www.google.com/">
                    <img src="/images/login/google.svg">
                </a>
                <a class="clickable" href="https://www.kakaocorp.com/page/">
                    <img src="/images/login/kakaotalk.svg">
                </a>
            </div>
        </div>
        <div class="login-massage">
            <h3>이미 회원이신가요?</h3>
            <a href="/login">로그인</a>
        </div>
    </div>
</body>
</html>
