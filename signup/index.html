<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>회원가입 - 판다마켓</title>
    <link rel="stylesheet" href="../assets/css/reset.css" />
    <link rel="stylesheet" href="../assets/css/common.css" />
    <link rel="stylesheet" href="../assets/css/login.css" />

    <!-- 오픈그래프 프로토콜 적용 -->
    <meta property="og:title" content="판다마켓">
    <meta property="og:description" content="판다마켓에서 당신의 상품을 거래하세요. 안전하고 신뢰할 수 있는 중고거래 플랫폼입니다.">
    <meta property="og:image" content="">
    <meta property="og:url" content="/">
    <meta property="og:type" content="website">
    <meta property="og:locale" content="ko_KR">
  </head>
  <body>
    <main class="login-container">
      <div class="login-wrapper">
        <div class="logo-container">
          <a href="/">
            <img src="../assets/img/header/logo-lg.svg" alt="판다마켓 로고" class="logo">
          </a>
        </div>

        <!-- 로그인 폼 -->
        <form class="login-form">
            <!-- 이메일 -->
          <div class="input-group">
            <label for="email" class="input-label">이메일</label>
            <input name="email" type="email" id="email" class="input-common" placeholder="이메일을 입력해주세요">
          </div>
          <!-- 닉네임 -->
          <div class="input-group">
            <label for="nickname" class="input-label">닉네임</label>
            <input name="nickname" type="text" id="nickname" class="input-common" placeholder="닉네임을 입력해주세요">
          </div>
          <!-- 비밀번호 -->
          <div class="input-group">
            <label for="password" class="input-label">비밀번호</label>
            <div class="input-password-group">
              <input name="password" type="password" id="password" class="input-common input-password" placeholder="비밀번호를 입력해주세요">
              <button type="button" class="input-password-toggle">
                <img src="../assets/img/auth/hidden-icon.svg" alt="비밀번호 보기">
              </button>
            </div>
          </div>
          <!-- 비밀번호 확인 -->
          <div class="input-group">
            <label for="password-check" class="input-label">비밀번호 확인</label>
            <div class="input-password-group">
              <input name="password-check" type="password" id="password-check" class="input-common input-password" placeholder="비밀번호를 다시 한 번 입력해주세요">
              <button type="button" class="input-password-toggle">
                <img src="../assets/img/auth/hidden-icon.svg" alt="비밀번호 보기">
              </button>
            </div>
          </div>

          <!-- 회원가입 버튼 -->
          <button type="submit" class="btn-large" disabled>회원가입</button>
        </form>

        <!-- 간편 로그인 -->
        <div class="social-login">
          <p>간편 로그인 하기</p>
          <div class="social-buttons">
            <a 
              href="https://www.google.com" 
              target="_blank" 
              rel="noopener noreferrer" 
              class="google-login"
              aria-label="구글로 이동"
            >
              <img src="../assets/img/auth/google-icon.svg" alt="구글 로그인">
            </a>
            <a 
              href="https://www.kakaocorp.com/page/" 
              target="_blank" 
              rel="noopener noreferrer" 
              class="kakao-login"
              aria-label="카카오로 이동"
            >
              <img src="../assets/img/auth/kakao-icon.svg" alt="카카오 로그인">
            </a>
          </div>
        </div>

        <!-- 회원가입 링크 -->
        <div class="signup-link">
          <p><span>이미 회원이신가요?</span> <a href="../login">로그인</a></p>
        </div>
      </div>
    </main>
  </body>
</html>
