<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="signup.css">

    <!-- Google Tag Manager -->

    new Date().getTime(),event:'gtm.js'});var f=d.getElementsByTagName(s)[0],
    j=d.createElement(s),dl=l!='dataLayer'?'&l='+l:'';j.async=true;j.src=

<body class="pc">
    <!-- Google Tag Manager (noscript) -->
    <noscript><iframe src="https://www.googletagmanager.com/ns.html?id=GTM-TRRLGNXD"
    height="0" width="0" style="display:none;visibility:hidden"></iframe></noscript>
    <!-- End Google Tag Manager (noscript) -->

    <div class="signup-box">
        <div class="main-logo">
            <a class="clickable" href="/">
                <img src="/images/landing/logo.svg">
            </a>
        </div>
        <form class="signup-form">

            <div class="email-form">
                <label for="email-input">이메일</label>
                <div class="input-box">
                    <input id="email-input" name="username" type="email" placeholder="이메일을 입력해주세요">
                </div>
                <h1 class="valid-check-text"></h1>
            </div>
            
            <div class="pw-form">
                <label for="pw-input">비밀번호</label>
                <div class="input-box">
                    <input id="pw-input" name="password" type="password" placeholder="비밀번호를 입력해주세요">
                    <a class="pw-eye">
                        <img  src="/images/login/pw_eye.svg">
                    </a>
                </div>
                <h1 class="valid-check-text"></h1>
            </div>

            <div class="repw-form">
                <label for="repw-input">비밀번호 확인</label>
                <div class="input-box">
                    <input id="repw-input" name="password" type="password" placeholder="비밀번호를 입력해주세요">
                    <a class="pw-eye">
                        <img  src="/images/login/pw_eye.svg">
                    </a>
                </div>
                <h1 class="valid-check-text"></h1>
            </div>

            <button type="submit">회원가입</button>
        </form>
        <div class="simple-login">
            <h1>간편 로그인 하기</h1>
            <div>
                <a class="clickable" href="https://www.google.com/" target="_blank">
                    <img src="/images/login/google.svg">
                </a>
                <a class="clickable" href="https://www.kakaocorp.com/page/" target="_blank">
                    <img src="/images/login/kakaotalk.svg">
                </a>
            </div>
        </div>
        <div class="login-massage">
            <h3>이미 회원이신가요?</h3>
            <a href="/login">로그인</a>
        </div>
    </div>

    <script src="/commonModule/loginSignup.js"></script>
    <script src="/commonModule/platformScreenSet.js"></script>
</body>
</html>
