<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign up</title>
    <link rel="stylesheet" as="style" crossorigin
        href="https://cdn.jsdelivr.net/npm/pretendard@latest/dist/web/static/pretendard.css">
    <link rel="stylesheet" href="../styles/reset.css">
    <link rel="stylesheet" href="../styles/style.css">
    <link rel="stylesheet" href="../styles/auth.css">
</head>

<body>
    <main class="container">
        <a href="/"><img src="../img/common/logo/logo-lg.svg" /></a>
        <form>
            <fieldset>
                <label for="email">이메일</label>
                <div class="input-group">
                    <input id="email" type="email" autocomplete="email" placeholder="이메일을 입력해주세요" required />
                </div>
            </fieldset>
            <fieldset>
                <label for="nickname">닉네임</label>
                <div class="input-group">
                    <input id="nickname" type="text" placeholder="이메일을 입력해주세요" required />
                </div>
            </fieldset>
            <fieldset>
                <label for="input-pwd">비밀번호</label>
                <div class="input-group">
                    <input id="input-pwd" type="password" placeholder="비밀번호를 입력해주세요" />
                    <button id="toggle-pwd"></button>
                </div>
            </fieldset>
            <fieldset>
                <label for="input-pwd">비밀번호 확인</label>
                <div class="input-group">
                    <input id="input-pwd" type="password" placeholder="비밀번호를 다시 한 번 입력해주세요" />
                    <button id="toggle-pwd"></button>
                </div>
            </fieldset>
            <button type="submit" id="submit">회원가입</button>
        </form>
        <section class="ez-login">
            <div>간편 로그인하기</div>
            <div>
                <a href="https://www.google.com/"><img src="../img/common/social/google.svg" /></a>
                <a href="https://www.kakaocorp.com/page/"> <img src="../img/common/social/kakaotalk.svg" /></a>
            </div>
        </section>
        <div class="signup">
            이미 회원이신가요? <a href="/login.html">로그인</a>
        </div>
    </main>
</body>

</html>
