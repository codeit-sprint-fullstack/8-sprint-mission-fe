<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>판다마켓 - 회원가입</title>
  <link rel="icon" href="../img/common/icons/favicon.ico" />
  <link rel="stylesheet" as="style" crossorigin
    href="https://cdn.jsdelivr.net/npm/pretendard@latest/dist/web/static/pretendard.css">
  <link rel="stylesheet" href="../styles/reset.css">
  <link rel="stylesheet" href="../styles/home.css">
  <link rel="stylesheet" href="../styles/auth.css">
</head>

<body>
  <main class="container">
    <a href="/"><img src="../img/common/logo/logo-lg.svg" alt="판다마켓 홈" /></a>
    <form>
      <fieldset class="emailField">
        <label for="email">이메일</label>
        <div class="input-wrapper email-wrapper">
          <input id="email" type="email" autocomplete="email" placeholder="이메일을 입력해 주세요" required />
        </div>
      </fieldset>
      <fieldset class="nicknameField">
        <label for="nickname">닉네임</label>
        <div class="input-wrapper nickname-wrapper">
          <input id="nickname" type="text" placeholder="이메일을 입력해주세요" required />
        </div>
      </fieldset>
      <fieldset class="pwdField">
        <label for="pwd">비밀번호</label>
        <div class="input-wrapper pwd-wrapper">
          <input id="pwd" type="password" placeholder="비밀번호를 입력해주세요" />
          <button class="btn-toggle"></button>
        </div>
      </fieldset>
      <fieldset class="pwdCField">
        <label for="pwd-confirm">비밀번호 확인</label>
        <div class="input-wrapper pwd-confirm-wrapper">
          <input id="pwd-confirm" type="password" placeholder="비밀번호를 다시 한 번 입력해주세요" />
          <button class="btn-toggle"></button>
        </div>
      </fieldset>
      <button type="submit" id="submit">회원가입</button>
    </form>
    <section class="ez-login">
      <div>간편 로그인하기</div>
      <div>
        <a href="https://www.google.com/"><img src="../img/common/social/google.svg" alt="구글 로그인" /></a>
        <a href="https://www.kakaocorp.com/page/"> <img src="../img/common/social/kakaotalk.svg" alt="카카오톡 로그인" /></a>
      </div>
    </section>
    <div class="signup">
      이미 회원이신가요? <a href="/login">로그인</a>
    </div>
  </main>
  <script src="/js/userData.js"></script>
  <script src="/js/validation.js"></script>
</body>

</html>
