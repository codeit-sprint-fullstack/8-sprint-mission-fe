<!DOCTYPE html>
<html lang="kr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>회원가입</title>
  <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="../../global.css">
</head>
<body>
  <section>
    <a class="logo" href="/">
      <img src="../../img/pandaLogo_Face_Text.svg">
    </a>
    <div class="wrapper">
      <form>
        <div class="email">
          <label for="email">이메일</label>
          <input type="email" id="email" name="userEmail" required placeholder="이메일을 입력해주세요">
        </div>
        <div class="nickname">
          <label for="text">닉네임</label>
          <input type="text" id="nickname" name="userNickname" required placeholder="닉네임을 입력해주세요">
        </div>
        <div class="password">
          <label for="password">비밀번호</label>
          <input type="password" id="password" name="userPassword" required placeholder="비밀번호를 입력해주세요">
        </div>
        <div class="passwordCheck">
          <label for="passwordCheck">비밀번호 확인</label>
          <input type="password" id="passwordCheck" name="userPasswordCheck" required placeholder="비빌번호를 다시 한 번 입력해주세요">
        </div>
        <button type="submit">회원가입</button>
      </form>
      <div class="easyLogin">
        <div class="socialLogin">
          <div class="title">간편 로그인하기</div>
          <div class="socialButton">
            <a href="https://www.google.com">          
              <img class="googleLogin" alt="googleLogo" src="../../img/login_googleLogo.svg">
            </a>
            <a href="https://www.kakaocorp.com/page/">
              <img class="kakaoLogin" alt="kakaoLogo" src="../../img/login_kakaoLogo.svg">
            </a>
          </div>
        </div>
      </div>
      <div class="signup">
        <div>이미 회원이신가요?</div>
        <a href="../login.html">로그인</a>
      </div>
    </div>
  </section>
</body>
</html>
