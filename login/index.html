<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" as="style" crossorigin
        href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
    <link rel="stylesheet" href="style.css">
    <title>판다마켓</title>
</head>

<body>
    <div class="container">
        <div class="form">
            <div class="logo" div onclick="location.href = '/'">
                <img class="img-icon" src="/images/icon.svg">
                <img class="img-logo" src="/images/text_logo.svg">
            </div>

            <label for="email">이메일</label>
            <input id="email" type="email" placeholder="이메일을 입력해주세요">
            <p class="email error"></p>
            <label for="password">비밀번호</label>
            <div class="input-password">
                <input id="password" type="password" placeholder="비밀번호를 입력해주세요">
                <img src="/images/visibility.svg">
            </div>
            <p class="password error"></p>
            <button id="login" disabled>로그인</button>

            <div class="simple-login">
                <p>간편 로그인하기</p>
                <div>
                    <button class="google" onclick="location.href = 'https://www.google.com/'">
                        <img src="/images/ic_google.svg">
                    </button>
                    <button class="kakao" onclick="location.href = 'https://www.kakaocorp.com/page/'">
                        <img src="/images/ic_kakao.svg">
                    </button>
                </div>
            </div>

            <div class="signup">
                <p>판다마켓이 처음이신가요?</p>
                <a href="/signup">회원가입</a>
            </div>

        </div>
    </div>
    <script type="module" src="main.js"></script>
</body>

</html>
