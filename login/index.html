<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="login-box">
        <div class="main-logo">
            <a class="clickable" href="/">
                <img src="/images/landing/logo.svg">
            </a>
        </div>
        
        <form class="login-form">
            <label for="id-input">이메일</label>
            <input id="id-input" name="username" type="email" placeholder="이메일을 입력해주세요">
            <label for="pw-input">비밀번호</label>
            <div class="pw-input-box">
                <input id="pw-input" name="password" type="password" placeholder="비밀번호를 입력해주세요">
                <a class="pw-eye">
                    <img  src="/images/login/pw_eye.svg">
                </a>
            </div>
            <button>로그인</button>
        </form>
        <div class="simple-login">
            <h1>간편 로그인 하기</h1>
            <div>
                <a class="clickable" href="https://www.google.com/">
                    <img src="/images/login/google.svg">
                </a>
                <a class="clickable" href="https://www.kakaocorp.com/page/">
                    <img src="/images/login/kakaotalk.svg">
                </a>
            </div>
        </div>
        <div class="signup-massage">
            <h3>판다마켓이 처음이신가요?</h3>
            <a href="/signup">회원가입</a>
        </div>
    </div>
</body>
</html>
